version: "3.9"

services:
  auth-api:
    build: .
    container_name: auth-api-service
    ports:
      - "8080:8080"
    environment:
      APP_PORT: "8080"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "auth_db"
      DB_USER: "postgres"
      DB_PASSWORD: "password"
      JWT_SECRET: "q3s6v9yB8E2HMcQfTjWnZr4u7x1A9CkLp"
      JWT_EXPIRATION: "3600000"
      JWT_ISSUER: "hackathon-issuer"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - auth-network
    restart: unless-stopped

  postgres:
    image: postgres:17.5-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "password"
      POSTGRES_DB: "auth_db"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - auth-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  auth-network:
    driver: bridge

volumes:
  postgres_data: