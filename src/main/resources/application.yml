spring:
  application:
    name: hackathon-auth-ms

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth_db}
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: ${JWT_SECRET:qAkwER/knmSv1FZ0qzH+E9EEj5YsLn5zm9M/fY8RH9c=}
  issuer: ${JWT_ISSUER:hackathon-issuer}
  expiration: ${JWT_EXPIRATION:3600000}

server:
  port: ${APP_PORT:8080}
